# Azure Pipelines — Continuous Delivery (Build & Deploy)
# Manual trigger only - focused on building Docker images and deploying to environments
# SDAC AI Widget

trigger: none
pr: none

parameters:
- name: deployTarget
  displayName: Deploy Target Environment
  type: string
  default: dev
  values:
  - buildOnly
  - dev
  - prod
  - all

- name: serviceConnection
  displayName: Azure Service Connection
  type: string
  default: TAPServiceConnection
  values:
  - TAPServiceConnection
  - TherapyLogServiceConnection

variables:
  System.Debug: true
  imageName: sdac-widget
  dockerfilePath: $(Build.SourcesDirectory)/Dockerfile
  buildContext: $(Build.SourcesDirectory)

  # ---- ENV targets (update these with actual values) ----
  # TAP Environment
  WEB_APP_DEV: sdac-widget-dev
  RESOURCE_GROUP_DEV: DEV-SDAC-Widget
  WEB_APP_PROD: sdac-widget-prod
  RESOURCE_GROUP_PROD: PROD-SDAC-Widget

  # Build-time variables for Vite (client-side)
  # Note: Variables with spaces are handled via Dockerfile defaults
  # Only override these if you need different values
  VITE_DEMO_USER_ID: demo-user
  VITE_DEMO_USER_EMAIL: demo@example.com

pool:
  vmImage: ubuntu-latest

stages:
# ======================= Build =======================
- stage: BuildAndPush
  displayName: Build and push SDAC Widget image
  condition: always()
  jobs:
  - job: Build
    steps:
    - checkout: self
      clean: 'true'

    - bash: |
        set -euxo pipefail
        ls "$(Build.SourcesDirectory)"
        test -f "$(dockerfilePath)"
      displayName: Verify repository layout

    - task: AzureCLI@2
      displayName: Resolve ACR details
      inputs:
        azureSubscription: ${{ parameters.serviceConnection }}
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euxo pipefail
          case "${{ parameters.serviceConnection }}" in
            "TAPServiceConnection")
              ACR_NAME="tapcontainerregistry"
              ;;
            "TherapyLogServiceConnection")
              ACR_NAME="k12containerresgistry"
              ;;
            *)
              echo "Unsupported service connection"
              exit 1
              ;;
          esac

          LOGIN=$(az acr show -n "$ACR_NAME" --query loginServer -o tsv)
          if [ -z "$LOGIN" ]; then
            echo "ACR $ACR_NAME not found"
            exit 1
          fi
          echo "##vso[task.setvariable variable=acrLoginServer]$LOGIN"
          echo "##vso[task.setvariable variable=acrName]$ACR_NAME"
          echo "##vso[task.setvariable variable=ACRNAME]$ACR_NAME"

    - task: AzureCLI@2
      name: buildImage
      displayName: Build image -> ACR
      inputs:
        azureSubscription: ${{ parameters.serviceConnection }}
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euxo pipefail
          ACR_NAME_RAW="${ACRNAME:?ACR name variable ACRNAME is not set}"
          ACR_NAME=$(printf '%s' "$ACR_NAME_RAW" | tr -cd '[:alnum:]')
          if [ -z "$ACR_NAME" ] || ! [[ "$ACR_NAME" =~ ^[A-Za-z0-9]+$ ]]; then
            echo "Invalid ACR name resolved from ACRNAME: '$ACR_NAME_RAW' -> '$ACR_NAME'"
            exit 1
          fi
          IMAGE_NAME="${IMAGE_NAME:?IMAGE_NAME env var is not set}"

          BUILD_TAG="${BUILD_BUILDID:-}"
          if [ -z "$BUILD_TAG" ]; then
            BUILD_TAG="manual-$(date +%s)"
          fi

          # Build the image using ACR build
          # Note: Variables with spaces (USER_NAME, USER_ROLE, DISTRICT) use Dockerfile defaults
          az acr build \
            --registry "$ACR_NAME" \
            --platform linux/amd64 \
            --build-arg "VITE_DEMO_USER_ID=${VITE_DEMO_USER_ID}" \
            --build-arg "VITE_DEMO_USER_EMAIL=${VITE_DEMO_USER_EMAIL}" \
            -t "$IMAGE_NAME:latest" \
            -t "$IMAGE_NAME:$BUILD_TAG" \
            -f "$(dockerfilePath)" \
            "$(buildContext)"

          # Get the digest for the built image
          LATEST_DIGEST=$(az acr manifest list-metadata \
            --registry "$ACR_NAME" \
            --name "$IMAGE_NAME" \
            --query "[?tags && contains(tags,'$BUILD_TAG')].digest" -o tsv | head -n1)

          if [ -z "$LATEST_DIGEST" ]; then
            echo "Failed to resolve digest for tag $BUILD_TAG"
            exit 1
          fi

          echo "##vso[task.setvariable variable=LATEST_DIGEST;isOutput=true]$LATEST_DIGEST"
          echo "##vso[task.setvariable variable=buildTag;isOutput=true]$BUILD_TAG"
      env:
        IMAGE_NAME: $(imageName)
        VITE_DEMO_USER_ID: $(VITE_DEMO_USER_ID)
        VITE_DEMO_USER_EMAIL: $(VITE_DEMO_USER_EMAIL)

    - bash: |
        echo "##vso[task.setvariable variable=acrLoginServer;isOutput=true]$(acrLoginServer)"
        echo "##vso[task.setvariable variable=acrName;isOutput=true]$(acrName)"
      name: publish
      displayName: Publish build outputs

# ======================= Deploy DEV =======================
- stage: DeployDev
  displayName: Deploy to DEV
  dependsOn: BuildAndPush
  condition: and(in('${{ parameters.deployTarget }}','dev','all'), in(dependencies.BuildAndPush.result, 'Succeeded', 'SucceededWithIssues'))
  variables:
    ACR_LOGIN_SERVER: $[ stageDependencies.BuildAndPush.Build.outputs['publish.acrLoginServer'] ]
    ACR_NAME:        $[ stageDependencies.BuildAndPush.Build.outputs['publish.acrName'] ]
    BUILD_TAG:       $[ stageDependencies.BuildAndPush.Build.outputs['buildImage.buildTag'] ]
    LATEST_DIGEST:   $[ stageDependencies.BuildAndPush.Build.outputs['buildImage.LATEST_DIGEST'] ]
  jobs:
  - job: DeployDev
    steps:
    - task: AzureCLI@2
      displayName: Deploy dev image
      inputs:
        azureSubscription: ${{ parameters.serviceConnection }}
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euxo pipefail
          TARGET_ENV="dev"
          ENV_UPPER=${TARGET_ENV^^}
          WEB_APP_VAR="WEB_APP_${ENV_UPPER}"
          RESOURCE_GROUP_VAR="RESOURCE_GROUP_${ENV_UPPER}"

          WEB_APP=${!WEB_APP_VAR:-}
          RESOURCE_GROUP=${!RESOURCE_GROUP_VAR:-}
          if [ -z "$WEB_APP" ] || [ -z "$RESOURCE_GROUP" ]; then
            echo "Pipeline variables $WEB_APP_VAR and $RESOURCE_GROUP_VAR must be defined"
            exit 1
          fi

          ACR_NAME="${ACR_NAME:?ACR_NAME not set}"
          ACR_LOGIN_SERVER="${ACR_LOGIN_SERVER:?ACR_LOGIN_SERVER not set}"
          LATEST_DIGEST="${LATEST_DIGEST:?LATEST_DIGEST not set}"

          ENV_TAG="${TARGET_ENV}"

          az acr import -n "$ACR_NAME" \
            --source "$ACR_LOGIN_SERVER/$(imageName)@${LATEST_DIGEST}" \
            --image "$(imageName):${ENV_TAG}" --force

          az webapp config container set \
            --name "$WEB_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --container-image-name "$ACR_LOGIN_SERVER/$(imageName):${ENV_TAG}" \
            --container-registry-url "https://$ACR_LOGIN_SERVER"

          az webapp restart --name "$WEB_APP" --resource-group "$RESOURCE_GROUP"

# ======================= Deploy PROD =======================
- stage: DeployProd
  displayName: Deploy to PROD
  dependsOn: BuildAndPush
  condition: and(in('${{ parameters.deployTarget }}','prod','all'), in(dependencies.BuildAndPush.result, 'Succeeded', 'SucceededWithIssues'))
  variables:
    ACR_LOGIN_SERVER: $[ stageDependencies.BuildAndPush.Build.outputs['publish.acrLoginServer'] ]
    ACR_NAME:        $[ stageDependencies.BuildAndPush.Build.outputs['publish.acrName'] ]
    BUILD_TAG:       $[ stageDependencies.BuildAndPush.Build.outputs['buildImage.buildTag'] ]
    LATEST_DIGEST:   $[ stageDependencies.BuildAndPush.Build.outputs['buildImage.LATEST_DIGEST'] ]
  jobs:
  - job: DeployProd
    steps:
    - task: AzureCLI@2
      displayName: Deploy prod image
      inputs:
        azureSubscription: ${{ parameters.serviceConnection }}
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euxo pipefail
          TARGET_ENV="prod"
          ENV_UPPER=${TARGET_ENV^^}
          WEB_APP_VAR="WEB_APP_${ENV_UPPER}"
          RESOURCE_GROUP_VAR="RESOURCE_GROUP_${ENV_UPPER}"

          WEB_APP=${!WEB_APP_VAR:-}
          RESOURCE_GROUP=${!RESOURCE_GROUP_VAR:-}
          if [ -z "$WEB_APP" ] || [ -z "$RESOURCE_GROUP" ]; then
            echo "Pipeline variables $WEB_APP_VAR and $RESOURCE_GROUP_VAR must be defined"
            exit 1
          fi

          ACR_NAME="${ACR_NAME:?ACR_NAME not set}"
          ACR_LOGIN_SERVER="${ACR_LOGIN_SERVER:?ACR_LOGIN_SERVER not set}"
          LATEST_DIGEST="${LATEST_DIGEST:?LATEST_DIGEST not set}"

          ENV_TAG="${TARGET_ENV}"

          az acr import -n "$ACR_NAME" \
            --source "$ACR_LOGIN_SERVER/$(imageName)@${LATEST_DIGEST}" \
            --image "$(imageName):${ENV_TAG}" --force

          az webapp config container set \
            --name "$WEB_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --container-image-name "$ACR_LOGIN_SERVER/$(imageName):${ENV_TAG}" \
            --container-registry-url "https://$ACR_LOGIN_SERVER"

          az webapp restart --name "$WEB_APP" --resource-group "$RESOURCE_GROUP"
