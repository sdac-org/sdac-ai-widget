services:
  sdac-widget:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time args for Vite (client-side variables)
        # These are baked into the client bundle at build time
        VITE_REPORT_ID: ${VITE_REPORT_ID:-}
        VITE_DEMO_USER_ID: ${VITE_DEMO_USER_ID:-demo-user}
        VITE_DEMO_USER_NAME: ${VITE_DEMO_USER_NAME:-Demo User}
        VITE_DEMO_USER_EMAIL: ${VITE_DEMO_USER_EMAIL:-demo@example.com}
        VITE_DEMO_USER_ROLE: ${VITE_DEMO_USER_ROLE:-District Admin}
        VITE_DEMO_DISTRICT: ${VITE_DEMO_DISTRICT:-Demo District}
    image: sdac-ai-widget:latest
    container_name: sdac-widget
    ports:
      - "${HOST_PORT:-5000}:5000"
    environment:
      # Runtime environment variables (server-side)
      - NODE_ENV=production
      - PORT=5000
      - MASTRA_BASE_URL=${MASTRA_BASE_URL}
      - MASTRA_AGENT_ID=${MASTRA_AGENT_ID:-sdac-coordinator-release}
      - INGESTION_API_URL=${INGESTION_API_URL}
    extra_hosts:
      # Allow container to access host machine services (only needed for local dev)
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Optional: Define a network for multi-container setups
networks:
  default:
    name: sdac-network
    driver: bridge
